<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>RotaViva</title>
  <link rel="stylesheet" href="Styles/Style.css">
  </head>
<body>

    <header class="header-container">
        <div class="titulo">
            <h1 class="principal">
                <a href="index.html" class="logo_Inicial">
                    <span class="principal__destaque">Rota</span>
                    <span class="principal__viva">Viva</span>
                </a>
            </h1>
        </div>

        <div>
            <nav class="nav">
                <ul>
                    <li><a href="#" class="bot_login">
                        <img class="bot_icone" src="Imagens/4210449 2.svg" alt="">
                        Login
                    </a></li>
                </ul>
            </nav>
        </div>
    </header>

 
  <!-- CONTEÚDO PRINCIPAL -->
  <main class="main">
    <div class="card-login">
 
      <!-- Logo dentro do card -->
      <div class="card-logo">
        <span class="card-logo-rota">Rota</span><br />
        <span class="card-logo-viva">Viva</span>
      </div>
 
      <!-- Subtítulo -->
      <p class="card-subtitulo">
        Comece A Preparar A Viagem Dos Seus<br />
        Sonhos Agora Mesmo!!
      </p>
 
      <!-- Formulário -->
      <div class="formulario">
 
        <!-- Campo CPF / Telefone -->
        <div class="campo">
          <input type="text" placeholder="CPF Ou Nº De Telefone" />
        </div>
 
        <!-- Campo Senha -->
        <div class="campo">
          <input type="password" placeholder="Senha" />
        </div>
 
        <!-- Esqueci minha senha -->
        <a href="#" class="link-esqueci">Esqueci minha senha</a>
 
        <!-- Botão Entrar -->
        <button class="btn-entrar">Entrar</button>
 
      </div>
    </div>
  </main>



<footer class="footer-container">
        <div class="footer-content">
            
            <div class="footer-col-info">
                <h3 class="footer-logo"><span>Rota</span>Viva</h3>
                <p>Conectando caminhos, transformando rotas urbanas e promovendo a mobilidade inteligente.</p>
            </div>

            <div class="footer-col-links">
                <ul>
                    <li><a href="index.html">Início</a></li>
                    <li><a href="Sobre.html">Sobre Nós</a></li>
                    <li><a href="#">Contato</a></li>
                </ul>
            </div>

        </div>

        <div class="footer-bottom">
            <p>&copy; 2026 Rota Viva. Todos os direitos reservados.</p>
        </div>
    </footer>
 
</body>
</html>
